services:
  db-historial:
    image: postgres:15-alpine
    container_name: soa-postgres-historial
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5435:5432"
    volumes:
      - pg_data_historial:/var/lib/postgresql/data

volumes:
  pg_data_historial: